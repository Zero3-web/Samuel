<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños! 🎂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --editor-bg: #161b22;
            --title-bg: #21262d;
            --text-color: #c9d1d9;
            --keyword: #ff7b72;
            --function: #d2a8ff;
            --string: #a5d6ff;
            --comment: #8b949e;
            --number: #79c0ff;
            --accent: #58a6ff;
            --cake-color: #f2ce76;
            --sparkle: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #05070a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1f2c 0%, #05070a 100%);
            padding: 20px;
        }

        #background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: blur(5px);
            z-index: -1;
        }

        .window {
            width: 100%;
            max-width: 800px;
            background: var(--editor-bg);
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 5;
            margin-bottom: 30px;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .title-bar {
            background: var(--title-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .title {
            color: #8b949e;
            font-size: 11px;
            flex-grow: 1;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.5px;
            text-transform: lowercase;
        }

        .content {
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-color);
            position: relative;
            min-height: 550px;
            overflow-x: auto;
        }

        .line {
            display: flex;
            gap: 15px;
            min-width: fit-content;
        }

        .line-number {
            color: #484f58;
            text-align: right;
            width: 20px;
            user-select: none;
            flex-shrink: 0;
        }

        .code {
            white-space: pre;
            color: var(--text-color);
        }

        /* Syntax Highlighting */
        .kwd { color: var(--keyword); }
        .fn { color: var(--function); }
        .str { color: var(--string); }
        .cmt { color: var(--comment); }
        .num { color: var(--number); }
        .var { color: var(--text-color); }
        .cake { color: var(--cake-color); text-shadow: 0 0 15px rgba(242, 206, 118, 0.6); }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,0,0,0.1) 100%);
            pointer-events: none;
        }

        button#celebrate-btn {
            padding: 12px 30px;
            background: transparent;
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(10px);
            display: none;
            z-index: 10;
        }

        button#celebrate-btn.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        button#celebrate-btn:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
            letter-spacing: 1px;
        }

        /* Responsive Improvements */
        @media (max-width: 600px) {
            body { padding: 10px; }
            #background-image { display: none; }
            .window { 
                max-width: 100%; 
                border-radius: 8px;
                box-shadow: 0 15px 30px rgba(0,0,0,0.4);
                margin-bottom: 20px;
            }
            .content {
                font-size: 10px;
                padding: 10px;
                min-height: 480px;
            }
            .line-number {
                width: 15px;
            }
            button#celebrate-btn {
                padding: 10px 20px;
                font-size: 12px;
            }
        }

        /* Start Overlay */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 10, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .start-btn {
            padding: 18px 45px;
            font-size: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            box-shadow: 0 0 40px rgba(88, 166, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .start-btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 10px 60px rgba(88, 166, 255, 0.5);
        }

        .start-msg {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 16px;
            text-align: center;
            max-width: 80%;
        }

        /* Sparkle CSS */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 2px white;
            animation: sparkle-anim linear forwards;
            z-index: 6;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }
    </style>
</head>

<body>
    <div id="start-overlay">
        <p class="start-msg">He preparado algo especial para Samuel...</p>
        <button class="start-btn" id="start-btn">¡Comenzar!</button>
    </div>

    <audio id="bg-music" src="./music.mp3" loop></audio>
    <audio id="confetti-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <img id="background-image" src="./dark_developer_workspace_background.png" alt="Background">

    <div class="window">
        <div class="title-bar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="title">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
                </svg>
                birthday_card.py
            </div>
        </div>
        <div class="content" id="editor-content">
            <!-- Lines will be injected here -->
        </div>
        <div class="overlay"></div>
    </div>
    <button id="celebrate-btn">Run celebrate_samuel()</button>

    <script>
        const editor = document.getElementById('editor-content');
        const btn = document.getElementById('celebrate-btn');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const music = document.getElementById('bg-music');
        const popSound = document.getElementById('confetti-sound');

        const codeLines = [
            { text: "************************************************", type: "cmt" },
            { text: " ", type: "plain" },
            { text: "   ****  HAPPY BIRTHDAY  ***   ", type: "fn" },
            { text: "          🎉 SAMUEL 🎉         ", type: "fn" },
            { text: " ", type: "plain" },
            { text: "               0   0           ", type: "cake" },
            { text: "               |   |           ", type: "cake" },
            { text: "            ___|___|___        ", type: "cake" },
            { text: "        0  |~ ~ ~ ~ ~ ~|  0    ", type: "cake" },
            { text: "        |  |           |  |    ", type: "cake" },
            { text: "     ___|__|___________|__|___ ", type: "cake" },
            { text: "    |/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/|", type: "cake" },
            { text: " 0  |      H a p p y          |  0", type: "cake" },
            { text: " |  |/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/|  |", type: "cake" },
            { text: " |__|_________________________|__|", type: "cake" },
            { text: "|/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/|", type: "cake" },
            { text: "|                                |", type: "cake" },
            { text: "|        B i r t h d a y ! ! !   |", type: "cake" },
            { text: "| ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~|", type: "cake" },
            { text: "|________________________________|", type: "cake" },
            { text: " ", type: "plain" },
            { text: " ", type: "plain" },
            { text: "************************************************", type: "cmt" },
            { text: " ", type: "plain" },
            { text: "def celebrate_samuel():", type: "kwd_fn" },
            { text: "    \"\"\"¡Felicidades Samuel!\"\"\"", type: "cmt" },
            { text: "    date = \"Viernes, 17 de Abril 2026\"", type: "var_str" },
            { text: "    sports_mode = True", type: "var_bool" },
            { text: "    ", type: "plain" },
            { text: "    return \"¡Te deseo un día increíble!\"", type: "ret_str" }
        ];

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 5 + 2;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDuration = (Math.random() * 1.5 + 0.5) + 's';
            
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 2000);
        }

        async function typeCode() {
            setInterval(createSparkle, 150); // Start background sparkles

            for (let i = 0; i < codeLines.length; i++) {
                const lineData = codeLines[i];
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';

                const numSpan = document.createElement('span');
                numSpan.className = 'line-number';
                numSpan.textContent = i + 1;

                const codeSpan = document.createElement('span');
                codeSpan.className = 'code ' + lineData.type;

                lineDiv.appendChild(numSpan);
                lineDiv.appendChild(codeSpan);
                editor.appendChild(lineDiv);

                const text = lineData.text;
                for (let j = 0; j < text.length; j++) {
                    codeSpan.textContent += text[j];
                    editor.scrollTop = editor.scrollHeight;
                    // Natural typing speed restored
                    await new Promise(r => setTimeout(r, Math.random() * 25 + 15));
                }

                // Syntax Highlighting
                if (lineData.type === 'kwd_fn') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace('def', '<span class="kwd">def</span>')
                        .replace('celebrate_samuel', '<span class="fn">celebrate_samuel</span>');
                } else if (lineData.type === 'var_str') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace('date', '<span class="var">date</span>')
                        .replace(/"(.*)"/, (match, p1) => `<span class="str">"${p1}"</span>`);
                } else if (lineData.type === 'var_bool') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace('sports_mode', '<span class="var">sports_mode</span>')
                        .replace('True', '<span class="num">True</span>');
                } else if (lineData.type === 'ret_str') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace('return', '<span class="kwd">return</span>')
                        .replace(/"(.*)"/, (match, p1) => `<span class="str">"${p1}"</span>`);
                }

                await new Promise(r => setTimeout(r, 60)); // Natural line delay
            }

            btn.classList.add('visible');
        }

        btn.addEventListener('click', () => {
            // Play pop sound
            popSound.currentTime = 0;
            popSound.play();

            confetti({
                particleCount: 180,
                spread: 80,
                origin: { y: 0.8 },
                colors: ['#ff7b72', '#d2a8ff', '#a5d6ff', '#f2ce76', '#ffffff']
            });

            // Sparkle burst
            for(let i=0; i<30; i++) setTimeout(createSparkle, i*50);

            setTimeout(() => {
                confetti({
                    particleCount: 120,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0 },
                });
                confetti({
                    particleCount: 120,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1 },
                });
            }, 400);
        });

        startBtn.addEventListener('click', () => {
            startOverlay.style.opacity = '0';
            setTimeout(() => {
                startOverlay.style.display = 'none';
            }, 800);
            
            music.play();
            typeCode();
        });
    </script>
</body>

</html>
