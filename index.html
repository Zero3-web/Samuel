<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños! 🎂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --editor-bg: #161b22;
            --title-bg: #21262d;
            --text-color: #c9d1d9;
            --keyword: #ff7b72;
            --function: #d2a8ff;
            --string: #a5d6ff;
            --comment: #8b949e;
            --number: #79c0ff;
            --accent: #58a6ff;
            --cake-color: #f2ce76;
            --sparkle: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #05070a;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1f2c 0%, #05070a 100%);
            padding: 0;
            position: fixed; /* Extra precaution for mobile scroll jumps */
        }

        html {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0.2;
            filter: blur(10px);
            z-index: -1;
        }

        .window {
            width: 100vw;
            height: 100vh;
            background: var(--editor-bg);
            box-shadow: none;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .title-bar {
            background: var(--title-bg);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            user-select: none;
            flex-shrink: 0;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .title {
            color: #8b949e;
            font-size: 13px;
            flex-grow: 1;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .content {
            padding: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
            position: relative;
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .line {
            display: flex;
            gap: 20px;
            margin-bottom: 2px;
            max-width: 100%;
            overflow: hidden;
        }

        .line.centered {
            justify-content: center;
            text-align: center;
        }

        .line.centered .line-number {
            display: none;
        }

        .line-number {
            color: #484f58;
            text-align: right;
            width: 30px;
            user-select: none;
            flex-shrink: 0;
            font-size: 12px;
        }

        .code {
            white-space: pre;
            color: var(--text-color);
            overflow: hidden; /* Prevent code from spilling out accidentally */
        }

        /* Syntax Highlighting */
        .kwd { color: var(--keyword); }
        .fn { color: var(--function); }
        .str { color: var(--string); }
        .cmt { color: var(--comment); }
        .num { color: var(--number); }
        .var { color: var(--text-color); }
        .cake { color: var(--cake-color); text-shadow: 0 0 15px rgba(242, 206, 118, 0.4); }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 80%, rgba(22, 27, 34, 0.8) 100%);
            pointer-events: none;
            z-index: 6;
        }

        button#celebrate-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 14px 45px;
            background: white;
            color: #05070a;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        button#celebrate-btn.visible {
            display: block;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        button#celebrate-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        /* Responsive Improvements */
        @media (max-width: 600px) {
            .content {
                font-size: 11px;
                padding: 15px;
            }
            .line-number {
                width: 20px;
                font-size: 10px;
            }
            button#celebrate-btn {
                bottom: 30px;
                padding: 12px 30px;
                font-size: 13px;
                width: 80%;
                max-width: 250px;
                text-align: center;
            }
            .title {
                font-size: 11px;
            }
        }

        /* Start Overlay */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05070a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .start-btn {
            padding: 18px 50px;
            font-size: 16px;
            background: white;
            color: #05070a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 60px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .start-msg {
            color: white;
            margin-bottom: 40px;
            font-size: 22px;
            text-align: center;
            max-width: 80%;
            font-weight: 300;
            letter-spacing: 2px;
            font-family: 'Inter', sans-serif;
        }

        /* Sparkle CSS */
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 1px white;
            animation: sparkle-anim linear forwards;
            z-index: 10;
            opacity: 0.6;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: scale(1.8) rotate(180deg); opacity: 0; }
        }
    </style>
</head>

<body>
    <div id="start-overlay">
        <p class="start-msg">Tengo algo para ti, Samuel</p>
        <button class="start-btn" id="start-btn">Ver</button>
    </div>

    <audio id="bg-music" src="./music.mp3" loop></audio>
    <audio id="confetti-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <img id="background-image" src="./dark_developer_workspace_background.png" alt="Background">

    <div class="window">
        <div class="title-bar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
                </svg>
                samuel_birthday.py — Visual Studio Code
            </div>
        </div>
        <div class="content" id="editor-content">
            <!-- Lines will be injected here -->
        </div>
        <div class="overlay"></div>
    </div>
    <button id="celebrate-btn">Celebrar</button>

    <script>
        const editor = document.getElementById('editor-content');
        const btn = document.getElementById('celebrate-btn');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const music = document.getElementById('bg-music');
        const popSound = document.getElementById('confetti-sound');

        const codeLines = [
            { text: "################################################", type: "cmt" },
            { text: " ", type: "plain" },
            { text: "   ****  HAPPY BIRTHDAY  ****   ", type: "fn" },
            { text: "          🚀 SAMUEL 🚀         ", type: "fn" },
            { text: " ", type: "plain" },
            { text: "               0   0           ", type: "cake" },
            { text: "               |   |           ", type: "cake" },
            { text: "            ___|___|___        ", type: "cake" },
            { text: "        0  |~ ~ ~ ~ ~ ~|  0    ", type: "cake" },
            { text: "        |  |           |  |    ", type: "cake" },
            { text: "     ___|__|___________|__|___ ", type: "cake" },
            { text: "    |/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/|", type: "cake" },
            { text: " 0  |      H a p p y          |  0", type: "cake" },
            { text: " |  |/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/|  |", type: "cake" },
            { text: " |__|_________________________|__|", type: "cake" },
            { text: "|/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/\\/|", type: "cake" },
            { text: "|                                |", type: "cake" },
            { text: "|        B i r t h d a y ! ! !   |", type: "cake" },
            { text: "| ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~|", type: "cake" },
            { text: "|________________________________|", type: "cake" },
            { text: " ", type: "plain" },
            { text: " ", type: "plain" },
            { text: "################################################", type: "cmt" },
            { text: " ", type: "plain" },
            { text: "def celebrate_samuel():", type: "kwd_fn" },
            { text: "    \"\"\"¡Felicidades Samuel por tu día especial!\"\"\"", type: "cmt" },
            { text: "    date = \"Viernes, 17 de Abril 2026\"", type: "var_str" },
            { text: "    sports_mode = True", type: "var_bool" },
            { text: "    status = \"Celebrando...\"", type: "var_str" },
            { text: "    ", type: "plain" },
            { text: "    return \"¡Que tengas un año lleno de código y éxito!\"", type: "ret_str" }
        ];

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 6 + 2;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDuration = (Math.random() * 2 + 1) + 's';
            
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3000);
        }

        async function typeCode() {
            setInterval(createSparkle, 400); // Much less frequent sparkles

            for (let i = 0; i < codeLines.length; i++) {
                const lineData = codeLines[i];
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                
                // Centering logic for cake and summary
                if (lineData.type === 'cake' || lineData.type === 'fn') {
                    lineDiv.classList.add('centered');
                }

                const numSpan = document.createElement('span');
                numSpan.className = 'line-number';
                numSpan.textContent = i + 1;

                const codeSpan = document.createElement('span');
                codeSpan.className = 'code ' + (lineData.type || 'plain');

                lineDiv.appendChild(numSpan);
                lineDiv.appendChild(codeSpan);
                editor.appendChild(lineDiv);

                const text = lineData.text;
                for (let j = 0; j < text.length; j++) {
                    codeSpan.textContent += text[j];
                    editor.scrollTop = editor.scrollHeight;
                    await new Promise(r => setTimeout(r, Math.random() * 20 + 10));
                }

                // Syntax Highlighting
                if (lineData.type === 'kwd_fn') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace('def', '<span class="kwd">def</span>')
                        .replace('celebrate_samuel', '<span class="fn">celebrate_samuel</span>');
                } else if (lineData.type === 'var_str') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace(/(date|status)/, '<span class="var">$1</span>')
                        .replace(/"(.*)"/, (match, p1) => `<span class="str">"${p1}"</span>`);
                } else if (lineData.type === 'var_bool') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace('sports_mode', '<span class="var">sports_mode</span>')
                        .replace('True', '<span class="num">True</span>');
                } else if (lineData.type === 'ret_str') {
                    codeSpan.innerHTML = codeSpan.innerHTML.replace('return', '<span class="kwd">return</span>')
                        .replace(/"(.*)"/, (match, p1) => `<span class="str">"${p1}"</span>`);
                }

                await new Promise(r => setTimeout(r, 80));
            }

            btn.classList.add('visible');
        }

        btn.addEventListener('click', () => {
            popSound.currentTime = 0;
            popSound.play();

            confetti({
                particleCount: 200,
                spread: 90,
                origin: { y: 0.9 },
                colors: ['#ff7b72', '#d2a8ff', '#a5d6ff', '#f2ce76', '#ffffff']
            });

            for(let i=0; i<40; i++) setTimeout(createSparkle, i*30);

            setTimeout(() => {
                confetti({ particleCount: 150, angle: 60, spread: 70, origin: { x: 0, y: 0.9 } });
                confetti({ particleCount: 150, angle: 120, spread: 70, origin: { x: 1, y: 0.9 } });
            }, 300);
        });

        startBtn.addEventListener('click', () => {
            startOverlay.style.opacity = '0';
            setTimeout(() => {
                startOverlay.style.display = 'none';
            }, 1000);
            
            music.play();
            typeCode();
        });
    </script>
</body>

</html>
